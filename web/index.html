<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="VCloud employee productivity MVP — chat, attendance, timesheet, tickets.">

  <!-- Required so Flutter's canvas is sized correctly; without this Edge logs
       "A 'viewport' meta element was not specified" and renders a blank page. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <meta name="theme-color" content="#0175C2">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="vcloud">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>VCloud</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0175C2; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #boot-loader {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      color: #fff; flex-direction: column; gap: 12px; z-index: 0;
    }
    #boot-loader .spinner {
      width: 36px; height: 36px; border: 3px solid rgba(255,255,255,.35);
      border-top-color: #fff; border-radius: 50%; animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #boot-error {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      background: #fff; color: #b00020; padding: 24px; font-size: 14px; z-index: 10; text-align: center;
    }
 </style>
</head>
<body>
  <!-- Passkeys Web SDK (required by the transitive `passkeys` package that
       supabase_flutter pulls in). Must load SYNCHRONOUSLY and BEFORE the
       Flutter engine so window.PasskeyAuthenticator exists by the time the
       web plugin's registerWith() runs — otherwise it calls window.close()
       and the app dies right after booting. Self-hosted (not the GitHub
       release URL) because GitHub serves it as application/octet-stream with
       nosniff, which Edge/Chrome refuse to execute. -->
  <script src="passkeys_bundle.js" type="application/javascript"></script>

  <!-- Bootstrap the Flutter engine. The opening tag MUST be properly
       closed (async></script>) — a missing ">" makes the browser swallow
       flutter_bootstrap.js and the app never boots, leaving only the
       #0175C2 body background visible. -->
  <script src="flutter_bootstrap.js" async></script>

  <!-- Visible fallback while Flutter initialises -->
  <div id="boot-loader">
    <div class="spinner"></div>
    <div>Loading VCloud…</div>
 </div>

  <!-- Visible fallback if Flutter fails to boot (uncaught error in bootstrap) -->
  <div id="boot-error">
    VCloud failed to start. Open DevTools (F12) → Console for details.
 </div>

  <script>
    // If Flutter reports a boot failure, swap the loader for the error message.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('boot-loader');
      if (el) el.style.display = 'none';
    });
    window.addEventListener('error', function (e) {
      var err = document.getElementById('boot-error');
      if (err) err.style.display = 'flex';
    }, true);
 </script>
</body>
</html>
